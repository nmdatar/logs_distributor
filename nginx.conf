events {
    worker_connections 1024;
    use epoll;
}

http {
    # Upstream for ingestor load balancing
    upstream ingestor_backend {
        # Round-robin load balancing
        server ingestor-1:8000;
        server ingestor-2:8000;
        server ingestor-3:8000;
        
        # Health checks
        keepalive 32;
    }

    # Rate limiting (optional)
    limit_req_zone $binary_remote_addr zone=ingestor_limit:10m rate=1000r/s;

    server {
        listen 80;
        
        # Rate limiting (optional)
        limit_req zone=ingestor_limit burst=2000 nodelay;
        
        location / {
            proxy_pass http://ingestor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffering for better performance
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://ingestor_backend/health;
            access_log off;
        }
        
        # Nginx status (for monitoring)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }
    }
} 